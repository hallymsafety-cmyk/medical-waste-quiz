<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>의료폐기물 분리배출 OX퀴즈</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Pretendard', 'Noto Sans KR', Arial, sans-serif;
    background: linear-gradient(160deg, #d9006c, #ff2f93);
    min-height: 100vh;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
  }
  .app { width: 100%; max-width: 520px; }
  .card {
    background: #fff;
    border-radius: 26px;
    padding: 30px 24px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.22);
    text-align: center;
  }
  .hidden { display: none; }
  .badge {
    display: inline-block;
    padding: 8px 14px;
    background: #ffe5f2;
    color: #d9006c;
    border-radius: 999px;
    font-weight: 800;
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 14px; font-size: 28px; line-height: 1.35; }
  h2 { margin: 0 0 16px; font-size: 23px; line-height: 1.42; }
  .subtitle { font-size: 18px; line-height: 1.55; font-weight: 700; margin: 18px 0 22px; }
  .small { color: #666; line-height: 1.6; font-size: 14px; }
  button {
    border: 0;
    border-radius: 16px;
    padding: 15px 18px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    transition: 0.18s ease;
    width: 100%;
  }
  button:active { transform: scale(0.98); }
  button:disabled { cursor: not-allowed; opacity: .65; }
  .start-btn {
    background: #d9006c;
    color: #fff;
    margin-top: 18px;
  }
  .quiz-top { text-align: left; margin-bottom: 18px; }
  .q-number { font-weight: 900; color: #d9006c; font-size: 18px; }
  .progress-wrap {
    margin-top: 12px;
    background: #f1f1f1;
    height: 12px;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: #d9006c;
    transition: width 0.3s;
  }
  .question {
    min-height: 170px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    line-height: 1.55;
    font-weight: 800;
    word-break: keep-all;
  }
  .answer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  .yes-btn {
    background: #ecfff3;
    color: #087b36;
    border: 2px solid #27ae60;
    font-size: 42px;
    padding: 24px 10px;
  }
  .no-btn {
    background: #fff0f0;
    color: #b91c1c;
    border: 2px solid #ef4444;
    font-size: 42px;
    padding: 24px 10px;
  }
  .selected-yes { background: #27ae60 !important; color: #fff !important; }
  .selected-no { background: #ef4444 !important; color: #fff !important; }

  .score {
    font-size: 54px;
    font-weight: 1000;
    color: #d9006c;
    margin: 10px 0 6px;
  }
  .result-message {
    margin: 18px 0 6px;
    font-size: 16px;
    line-height: 1.75;
    color: #444;
    word-break: keep-all;
  }
  .campaign-slogan {
    margin: 22px 0 4px;
    padding: 14px 12px;
    border-radius: 16px;
    background: #eefaf3;
    color: #087b36;
    font-size: 18px;
    line-height: 1.45;
    font-weight: 900;
  }

  .curtain {
    position: fixed;
    inset: 0;
    z-index: 30;
    pointer-events: none;
    display: flex;
  }
  .curtain-panel {
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, #9b004e, #e00070, #9b004e);
    box-shadow: inset 0 0 35px rgba(0,0,0,0.25);
    transition: transform 1.05s cubic-bezier(.7, 0, .2, 1);
  }
  .curtain-panel.left { border-right: 3px solid rgba(255,255,255,0.25); }
  .curtain-panel.right { border-left: 3px solid rgba(255,255,255,0.25); }
  .curtain.open .curtain-panel.left { transform: translateX(-105%); }
  .curtain.open .curtain-panel.right { transform: translateX(105%); }
  .curtain.hide { display: none; }

  #confettiCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  .submit-box {
    margin-top: 22px;
    padding: 18px;
    background: #fff5fa;
    border-radius: 18px;
    text-align: left;
  }
  .submit-title {
    font-weight: 900;
    color: #d9006c;
    margin-bottom: 12px;
    text-align: center;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 800;
    margin: 12px 0 6px;
    color: #444;
  }
  input, select {
    width: 100%;
    padding: 14px 13px;
    border: 2px solid #f2b2d0;
    border-radius: 14px;
    font-size: 16px;
    outline: none;
    background: #fff;
  }
  input:focus, select:focus { border-color: #d9006c; }
  .submit-btn {
    background: #222;
    color: #fff;
    margin-top: 16px;
  }
  .submit-message {
    margin-top: 12px;
    font-size: 14px;
    font-weight: 800;
    text-align: center;
    line-height: 1.45;
  }
  .success-msg { color: #087b36; }
  .error-msg { color: #b91c1c; }

  @media (max-width: 420px) {
    .card { padding: 26px 18px; border-radius: 22px; }
    h1 { font-size: 24px; }
    .question { font-size: 20px; min-height: 180px; }
    button { font-size: 17px; }
    .yes-btn, .no-btn { font-size: 38px; }
  }
</style>
</head>
<body>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby9ncdrBm_MAW8D4FW1rGds_45XgTovP7c8av6tcsMbnlm1jWI4SqakLUoHb0hoHftunw/exec";
let submitted = false;
let answerLocked = false;

const questions = [
  { q: '혈액이나 체액이 묻지 않은 비닐 포장재는 일반사업장폐기물로 배출한다.', a: 'O' },
  { q: '혈액이 묻은 거즈는 일반사업장폐기물로 배출한다.', a: 'X' },
  { q: '포장재에 환자의 혈액이나 체액이 묻은 경우 의료폐기물로 배출한다.', a: 'O' },
  { q: '깨끗한 의료기기 종이박스는 의료 관련 제품으로 의료폐기물로 배출한다.', a: 'X' },
  { q: '플라스틱 포장재는 오염되지 않아도 의료폐기물로 배출한다.', a: 'X' },
  { q: '혈액이 묻은 장갑은 의료폐기물로 배출한다.', a: 'O' },
  { q: '사용하지 않은 거즈와 포장지는 일반폐기물이다.', a: 'O' },
  { q: '주사기 바늘은 오염되지 않아도 의료폐기물로 배출한다.', a: 'O' },
  { q: '혈액·체액이 묻지 않은 가운, 캡, 덧신 등 개인보호구는 일반사업장폐기물로 배출한다.', a: 'O' },
  { q: '미사용 일반수액백은 일반사업장폐기물 또는 재활용폐기물로 배출한다.', a: 'O' },
  { q: '의료폐기물은 일반폐기물보다 처리비용이 적다.', a: 'X' },
  { q: '감염병 또는 격리환자와 관련된 것은 반드시 의료폐기물로 배출한다.', a: 'O' },
  { q: '환자복, 침구류를 사용 후 바로 폐기할 경우 의료폐기물로 배출한다.', a: 'O' },
  { q: '모든 폐의약품은 의료폐기물이다.', a: 'X' },
  { q: '감염의 우려가 없는 일반 환자들이 사용했던 생활용품도 의료폐기물이다.', a: 'X' },
  { q: '의료폐기물 분리배출은 감염예방, 환경보호, 비용절감 효과가 있다.', a: 'O' },
  { q: '환자가 사용하는 모든 기저귀는 의료폐기물이다.', a: 'X' },
  { q: '환자복, 침구류를 세탁하여 폐기하는 경우 일반사업장폐기물로 배출한다.', a: 'O' },
  { q: '백신·항암제·화학치료제가 혼합되는 경우에는 의료폐기물로 배출한다.', a: 'O' },
  { q: '의료폐기물 분리배출은 의료기관 종사자의 의무이다.', a: 'O' }
];

let currentIndex = 0;
let score = 0;
let userAnswers = [];

function show(id) {
  ['startScreen', 'quizScreen', 'resultScreen'].forEach(screenId => {
    document.getElementById(screenId).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function startQuiz() {
  currentIndex = 0;
  score = 0;
  userAnswers = [];
  answerLocked = false;

  const curtain = document.getElementById('curtain');
  curtain.classList.remove('hide', 'open');

  setTimeout(() => curtain.classList.add('open'), 80);
  setTimeout(() => {
    show('quizScreen');
    renderQuestion();
  }, 520);
  setTimeout(() => curtain.classList.add('hide'), 1250);
}

function renderQuestion() {
  answerLocked = false;

  const item = questions[currentIndex];
  document.getElementById('questionNumber').textContent =
    `문제 ${currentIndex + 1} / ${questions.length}`;
  document.getElementById('questionText').textContent = item.q;
  document.getElementById('progressBar').style.width =
    `${(currentIndex / questions.length) * 100}%`;

  const yesButton = document.getElementById('yesButton');
  const noButton = document.getElementById('noButton');

  yesButton.classList.remove('selected-yes');
  noButton.classList.remove('selected-no');
  yesButton.disabled = false;
  noButton.disabled = false;
}

function selectAnswer(answer) {
  if (answerLocked) return;
  answerLocked = true;

  const yesButton = document.getElementById('yesButton');
  const noButton = document.getElementById('noButton');

  yesButton.disabled = true;
  noButton.disabled = true;
  yesButton.classList.toggle('selected-yes', answer === 'O');
  noButton.classList.toggle('selected-no', answer === 'X');

  const correct = questions[currentIndex].a;
  const isCorrect = answer === correct;

  if (isCorrect) score += 5;

  userAnswers.push({
    number: currentIndex + 1,
    question: questions[currentIndex].q,
    correctAnswer: correct,
    userAnswer: answer,
    isCorrect
  });

  setTimeout(() => {
    currentIndex++;

    if (currentIndex < questions.length) {
      renderQuestion();
    } else {
      document.getElementById('progressBar').style.width = '100%';
      showResult();
    }
  }, 220);
}

function showResult() {
  show('resultScreen');

  const correctCount = userAnswers.filter(item => item.isCorrect).length;
  document.getElementById('finalScore').textContent = `${score}점`;
  document.getElementById('summaryText').textContent =
    `총 ${questions.length}문제 중 ${correctCount}문제를 맞혔습니다.`;

  submitted = false;
  document.getElementById('submitButton').disabled = false;
  document.getElementById('submitButton').textContent = '결과 제출하기';
  document.getElementById('submitMessage').textContent = '';
  document.getElementById('submitMessage').className = 'submit-message';

  launchConfetti();
}

function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const colors = ['#ffffff', '#ffe45e', '#ff8ac6', '#7cf7c7', '#8ec5ff', '#ff5f8f'];
  const pieces = Array.from({ length: 150 }, () => ({
    x: Math.random() * window.innerWidth,
    y: -20 - Math.random() * window.innerHeight * 0.45,
    size: 7 + Math.random() * 8,
    speedY: 2.5 + Math.random() * 4,
    speedX: -2 + Math.random() * 4,
    rotation: Math.random() * 360,
    rotationSpeed: -8 + Math.random() * 16,
    color: colors[Math.floor(Math.random() * colors.length)]
  }));

  let frame = 0;

  function animate() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    pieces.forEach(piece => {
      piece.x += piece.speedX;
      piece.y += piece.speedY;
      piece.rotation += piece.rotationSpeed;

      ctx.save();
      ctx.translate(piece.x, piece.y);
      ctx.rotate(piece.rotation * Math.PI / 180);
      ctx.fillStyle = piece.color;
      ctx.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.6);
      ctx.restore();
    });

    frame++;

    if (frame < 150) {
      requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }
  }

  animate();
}

function jsonpRequest(url, params) {
  return new Promise((resolve, reject) => {
    const callbackName =
      'quizCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

    params.callback = callbackName;

    const query = Object.keys(params)
      .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key]))
      .join('&');

    const script = document.createElement('script');
    script.src = url + '?' + query;

    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('제출 시간이 초과되었습니다. 인터넷 연결을 확인해 주세요.'));
    }, 12000);

    function cleanup() {
      clearTimeout(timeout);
      if (script.parentNode) script.parentNode.removeChild(script);
      delete window[callbackName];
    }

    window[callbackName] = response => {
      cleanup();
      resolve(response);
    };

    script.onerror = () => {
      cleanup();
      reject(new Error('제출 중 오류가 발생했습니다.'));
    };

    document.body.appendChild(script);
  });
}

async function submitResult() {
  const department = document.getElementById('departmentInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  const message = document.getElementById('submitMessage');
  const submitButton = document.getElementById('submitButton');

  if (!department || !name) {
    message.textContent = '부서와 이름을 모두 입력해 주세요.';
    message.className = 'submit-message error-msg';
    return;
  }

  if (submitted) {
    message.textContent = '이미 제출되었습니다.';
    message.className = 'submit-message success-msg';
    return;
  }

  const correctCount = userAnswers.filter(item => item.isCorrect).length;
  const params = {
    department,
    name,
    score,
    correctCount
  };

  userAnswers.forEach((item, index) => {
    params['q' + (index + 1)] = item.userAnswer;
  });

  submitButton.disabled = true;
  submitButton.textContent = '제출 중...';
  message.textContent = '';
  message.className = 'submit-message';

  try {
    const result = await jsonpRequest(GAS_URL, params);

    if (result && result.success) {
      submitted = true;
      message.textContent = result.message || '제출이 완료되었습니다.';
      message.className = 'submit-message success-msg';
      submitButton.textContent = '제출 완료';
    } else {
      message.textContent =
        result && result.message ? result.message : '제출에 실패했습니다.';
      message.className = 'submit-message error-msg';
      submitButton.disabled = false;
      submitButton.textContent = '결과 제출하기';
    }
  } catch (error) {
    message.textContent = error.message;
    message.className = 'submit-message error-msg';
    submitButton.disabled = false;
    submitButton.textContent = '결과 제출하기';
  }
}
</script>
