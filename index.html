<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>의료폐기물 분리배출 YES or NO</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Pretendard', 'Noto Sans KR', Arial, sans-serif;
    background: linear-gradient(160deg, #d9006c, #ff2f93);

    display: flex;

    padding: 22px;
  }
  .app { width: 100%; max-width: 520px; }
  .card {
    background: #fff;

    padding: 30px 24px;

  }
  .hidden { display: none; }
  .badge {
    display: inline-block;

  h1 { margin: 0 0 14px; font-size: 28px; line-height: 1.35; }

  .small { color: #666; line-height: 1.5; font-size: 14px; }
  button {
    border: 0;
    border-radius: 16px;
    padding: 15px 18px;

    transition: 0.18s ease;

  }

  .progress-wrap {

  .no-btn { background: #fff0f0; color: #b91c1c; border: 2px solid #ef4444; }

  .selected-no { background: #ef4444 !important; color: #fff !important; }
  .feedback { display: none; }
  .correct { color: #0a8a3a; }
  .wrong { color: #d11a2a; }
  .score {
    font-size: 54px;
    font-weight: 1000;
    color: #d9006c;
    margin: 10px 0;
  }
  .grade {
    font-size: 28px;
    font-weight: 1000;
    margin: 10px 0 18px;
  }
  .review-list {
    text-align: left;
    margin-top: 18px;
    max-height: 360px;
    overflow: auto;
  }
  .review-item {
    background: #fff5fa;
    border-left: 5px solid #d9006c;
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 12px;
    line-height: 1.45;
  }
  .review-item b { color: #d9006c; }

  .curtain {
    position: fixed;
    inset: 0;
    z-index: 30;
    pointer-events: none;
    display: flex;
  }
  .curtain-panel {
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, #9b004e, #e00070, #9b004e);
    box-shadow: inset 0 0 35px rgba(0,0,0,0.25);
    transition: transform 1.05s cubic-bezier(.7, 0, .2, 1);
  }
  .curtain-panel.left { border-right: 3px solid rgba(255,255,255,0.25); }
  .curtain-panel.right { border-left: 3px solid rgba(255,255,255,0.25); }
  .curtain.open .curtain-panel.left { transform: translateX(-105%); }
  .curtain.open .curtain-panel.right { transform: translateX(105%); }
  .curtain.hide { display: none; }
  #confettiCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  .submit-box {
    margin-top: 22px;
    padding: 18px;
    background: #fff5fa;
    border-radius: 18px;
    text-align: left;
  }
  .submit-title {
    font-weight: 900;
    color: #d9006c;
    margin-bottom: 12px;
    text-align: center;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 800;
    margin: 12px 0 6px;
    color: #444;
  }
  input, select {
    width: 100%;
    padding: 14px 13px;
    border: 2px solid #f2b2d0;
    border-radius: 14px;
    font-size: 16px;
    outline: none;
    background: #fff;
  }
  input:focus, select:focus { border-color: #d9006c; }
  .submit-btn {
    background: #222;
    color: #fff;
    margin-top: 16px;
  }
  .submit-btn:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  .submit-message {
    margin-top: 12px;
    font-size: 14px;
    font-weight: 800;
    text-align: center;
    line-height: 1.45;
  }
  .success-msg { color: #087b36; }

  @media (max-width: 420px) {
    .card { padding: 26px 18px; border-radius: 22px; }
    h1 { font-size: 24px; }
    .question { font-size: 20px; min-height: 170px; }
    button { font-size: 17px; }
  }
</style>
</head>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby9ncdrBm_MAW8D4FW1rGds_45XgTovP7c8av6tcsMbnlm1jWI4SqakLUoHb0hoHftunw/exec";
let submitted = false;

const questions = [
  { q: '혈액이나 체액이 묻지 않은 주사기 비닐 포장재는 일반폐기물로 배출한다.', a: 'YES' },
  { q: '혈액이 묻은 거즈는 일반폐기물로 배출한다.', a: 'NO' },
  { q: '환자에게 사용한 수액세트는 의료폐기물로 배출한다.', a: 'YES' },
  { q: '깨끗한 의료기기 종이박스는 의료 관련 제품으로 의료폐기물로 배출한다.', a: 'NO' },
  { q: '멸균포장 비닐을 개봉한 후 오염되지 않아도 의료폐기물로 배출한다.', a: 'NO' },
  { q: '혈액이 묻은 장갑은 의료폐기물로 배출한다.', a: 'YES' },
  { q: '사용하지 않은 거즈와 포장지는 일반폐기물이다.', a: 'YES' },
  { q: '주사기 바늘은 오염되지 않아도 의료폐기물로 배출한다.', a: 'YES' },
  { q: '혈액이 묻지 않은 가운, 캡, 마스크 등 개인보호구는 일반폐기물로 배출한다.', a: 'YES' },
  { q: '혈액·체액으로 오염되지 않은 일반수액백은 일반폐기물로 배출한다.', a: 'YES' },
  { q: '의료폐기물은 일반폐기물보다 처리비용이 적다.', a: 'NO' },
  { q: '감염병 환자, 격리환자 또는 혈액이 함유된 일회용 기저귀는 의료폐기물로 배출한다.', a: 'YES' },
  { q: '환자복, 침구류를 사용 후 바로 폐기하는 경우 의료폐기물로 배출한다.', a: 'YES' },
  { q: '백신·항암제·화학치료제를 제외한 폐의약품은 의료폐기물로 배출한다.', a: 'NO' },
  { q: '일반건강검진환자가 사용한 일회용품은 의료폐기물로 배출한다.', a: 'NO' },
  { q: '혈액·체액으로 오염되지 않은 폐백신·항암제 수액백은 일반폐기물로 배출한다.', a: 'NO' },
  { q: '혈액이 묻지 않고 감염병이 아닌 환자의 기저귀는 일반폐기물로 배출한다.', a: 'YES' },
  { q: '환자복, 침구류를 세탁하여 폐기할 경우 일반폐기물로 배출한다.', a: 'YES' },
  { q: '백신·항암제·화학치료제를 제외한 폐의약품 중 마약류가 포함되어 있으면 의료폐기물로 배출한다.', a: 'NO' },
  { q: '의료폐기물 분리배출은 의료기관 종사자로서 반드시 지켜야 한다.', a: 'YES' }
];

let currentIndex = 0;
let selectedAnswer = null;
let score = 0;
let userAnswers = [];

function show(id) {
  ['startScreen', 'quizScreen', 'resultScreen', 'reviewScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startQuiz() {
  currentIndex = 0;
  score = 0;
  userAnswers = [];
  const curtain = document.getElementById('curtain');
  curtain.classList.remove('hide');
  curtain.classList.remove('open');
  setTimeout(() => curtain.classList.add('open'), 80);
  setTimeout(() => {
    show('quizScreen');
    renderQuestion();
  }, 520);
  setTimeout(() => curtain.classList.add('hide'), 1250);
}

function renderQuestion() {
  selectedAnswer = null;
  const item = questions[currentIndex];
  document.getElementById('questionNumber').textContent = `문제 ${currentIndex + 1} / ${questions.length}`;
  document.getElementById('questionText').textContent = item.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextButton').disabled = true;
  document.getElementById('nextButton').textContent = currentIndex === questions.length - 1 ? '결과 보기 ▶' : '다음 문항 ▶';
  document.getElementById('progressBar').style.width = `${((currentIndex) / questions.length) * 100}%`;
  document.getElementById('yesButton').classList.remove('selected-yes');
  document.getElementById('noButton').classList.remove('selected-no');
}

function selectAnswer(answer) {
  selectedAnswer = answer;
  document.getElementById('yesButton').classList.toggle('selected-yes', answer === 'YES');
  document.getElementById('noButton').classList.toggle('selected-no', answer === 'NO');
  document.getElementById('nextButton').disabled = false;
}

function nextQuestion() {
  if (!selectedAnswer) return;
  const correct = questions[currentIndex].a;
  const isCorrect = selectedAnswer === correct;
  if (isCorrect) score += 5;
  userAnswers.push({
    number: currentIndex + 1,
    question: questions[currentIndex].q,
    correctAnswer: correct,
    userAnswer: selectedAnswer,
    isCorrect
  });
  currentIndex++;
  if (currentIndex < questions.length) {
    renderQuestion();
  } else {
    document.getElementById('progressBar').style.width = '100%';
    showResult();
  }
}

function getGrade(score) {
  if (score === 100) return '🏆 ESG MASTER';
  if (score >= 90) return '🥇 GOLD';
  if (score >= 80) return '🥈 SILVER';
  if (score >= 70) return '🥉 BRONZE';
  return '🌱 STARTER';
}

function showResult() {
  show('resultScreen');
  document.getElementById('finalScore').textContent = `${score}점`;
  document.getElementById('gradeText').textContent = getGrade(score);
  const correctCount = userAnswers.filter(x => x.isCorrect).length;
  document.getElementById('summaryText').textContent = `총 ${questions.length}문항 중 ${correctCount}문항 정답입니다.`;
  submitted = false;
  document.getElementById('submitButton').disabled = false;
  document.getElementById('submitButton').textContent = '결과 제출하기';
  document.getElementById('submitMessage').textContent = '';
  document.getElementById('submitMessage').className = 'submit-message';
  launchConfetti();
}

function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const colors = ['#ffffff', '#ffe45e', '#ff8ac6', '#7cf7c7', '#8ec5ff', '#ff5f8f'];
  const pieces = Array.from({ length: 150 }, () => ({
    x: Math.random() * window.innerWidth,
    y: -20 - Math.random() * window.innerHeight * 0.45,
    size: 7 + Math.random() * 8,
    speedY: 2.5 + Math.random() * 4,
    speedX: -2 + Math.random() * 4,
    rotation: Math.random() * 360,
    rotationSpeed: -8 + Math.random() * 16,
    color: colors[Math.floor(Math.random() * colors.length)]
  }));

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    pieces.forEach(p => {
      p.x += p.speedX;
      p.y += p.speedY;
      p.rotation += p.rotationSpeed;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      ctx.restore();
    });
    frame++;
    if (frame < 150) {
      requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }
  }
  animate();
}



function jsonpRequest(url, params) {
  return new Promise((resolve, reject) => {
    const callbackName = 'quizCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    params.callback = callbackName;

    const query = Object.keys(params)
      .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key]))
      .join('&');

    const script = document.createElement('script');
    script.src = url + '?' + query;

    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('제출 시간이 초과되었습니다. 인터넷 연결을 확인해 주세요.'));
    }, 12000);

    function cleanup() {
      clearTimeout(timeout);
      if (script.parentNode) script.parentNode.removeChild(script);
      delete window[callbackName];
    }

    window[callbackName] = (response) => {
      cleanup();
      resolve(response);
    };

    script.onerror = () => {
      cleanup();
      reject(new Error('제출 중 오류가 발생했습니다.'));
    };

    document.body.appendChild(script);
  });
}

async function submitResult() {
  const department = document.getElementById('departmentInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  const message = document.getElementById('submitMessage');
  const submitButton = document.getElementById('submitButton');

  if (!department || !name) {
    message.textContent = '부서와 이름을 모두 입력해 주세요.';
    message.className = 'submit-message error-msg';
    return;
  }

  if (submitted) {
    message.textContent = '이미 제출되었습니다.';
    message.className = 'submit-message success-msg';
    return;
  }

  const correctCount = userAnswers.filter(x => x.isCorrect).length;
  const params = {
    department,
    name,
    score,
    correctCount
  };

  userAnswers.forEach((item, index) => {
    params['q' + (index + 1)] = item.userAnswer;
  });

  submitButton.disabled = true;
  submitButton.textContent = '제출 중...';
  message.textContent = '';
  message.className = 'submit-message';

  try {
    const result = await jsonpRequest(GAS_URL, params);
    if (result && result.success) {
      submitted = true;
      message.textContent = result.message || '제출이 완료되었습니다.';
      message.className = 'submit-message success-msg';
      submitButton.textContent = '제출 완료';
    } else {
      message.textContent = (result && result.message) ? result.message : '제출에 실패했습니다.';
      message.className = 'submit-message error-msg';
      submitButton.disabled = false;
      submitButton.textContent = '결과 제출하기';
    }
  } catch (error) {
    message.textContent = error.message;
    message.className = 'submit-message error-msg';
    submitButton.disabled = false;
    submitButton.textContent = '결과 제출하기';
  }
}

function showReview() {
  show('reviewScreen');
  const wrongs = userAnswers.filter(x => !x.isCorrect);
  const list = document.getElementById('reviewList');
  if (wrongs.length === 0) {
    list.innerHTML = '<div class="review-item">🎉 틀린 문제가 없습니다. 완벽합니다!</div>';
    return;
  }
  list.innerHTML = wrongs.map(item => `
    <div class="review-item">
      <b>문제 ${item.number}</b><br>
      ${item.question}<br><br>
      내 답변: ${item.userAnswer}<br>
      정답: <b>${item.correctAnswer}</b>
    </div>
  `).join('');
}

function backToResult() { show('resultScreen'); }
function restartQuiz() { startQuiz(); }
